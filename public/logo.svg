<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 外周リング -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#6366f1" stroke-width="5"/>

  <!-- 目盛り（六角形の6頂点方向に合わせて配置） -->
  <line x1="50"  y1="4"   x2="50"  y2="10"  stroke="#6366f1" stroke-width="3.5"/>
  <line x1="89.8" y1="27" x2="85"  y2="29.8" stroke="#6366f1" stroke-width="3.5"/>
  <line x1="89.8" y1="73" x2="85"  y2="70.2" stroke="#6366f1" stroke-width="3.5"/>
  <line x1="50"  y1="96"  x2="50"  y2="90"  stroke="#6366f1" stroke-width="3.5"/>
  <line x1="10.2" y1="73" x2="15"  y2="70.2" stroke="#6366f1" stroke-width="3.5"/>
  <line x1="10.2" y1="27" x2="15"  y2="29.8" stroke="#6366f1" stroke-width="3.5"/>

  <!-- 中間リング -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#6366f1" stroke-width="3.5"/>

  <!-- 六角形（中間リングに内接、頂点が目盛りと同方向） -->
  <polygon points="50,18 77.7,34 77.7,66 50,82 22.3,66 22.3,34"
           fill="none" stroke="#6366f1" stroke-width="3"/>

  <!-- 内リング -->
  <circle cx="50" cy="50" r="13" fill="none" stroke="#6366f1" stroke-width="2.5"/>

  <!-- 中心の小円 -->
  <circle cx="50" cy="50" r="3" fill="none" stroke="#6366f1" stroke-width="2.5"/>
</svg>
